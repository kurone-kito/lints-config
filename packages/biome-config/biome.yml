'$schema': https://biomejs.dev/schemas/1.9.4/schema.json
files:
  ignore:
    - .*ignore
    - biome.json
    - package-lock.json
    - pnpm-lock.yaml
    - yarn.lock
  ignoreUnknown: true
formatter:
  # Compatible with Prettier
  indentStyle: space
javascript:
  formatter:
    # Compatible with Prettier
    quoteStyle: single
linter:
  enabled: true
  rules:
    complexity:
      # Tweak for TS4111
      useLiteralKeys: 'off'
    recommended: true
organizeImports:
  enabled: true
vcs:
  clientKind: git
  enabled: true
  useIgnoreFile: true

'$schema': './node_modules/@biomejs/biome/configuration_schema.json'
assist:
  actions:
    source:
      organizeImports: 'on'
css:
  parser:
    tailwindDirectives: true
files:
  ignoreUnknown: true
  includes:
    - '**'
    - '!**/.*ignore'
    - '!**/biome.json'
    - '!**/package-lock.json'
    - '!**/pnpm-lock.yaml'
    - '!**/yarn.lock'
formatter:
  # Compatible with Prettier
  indentStyle: space
javascript:
  formatter:
    # Compatible with Prettier
    quoteStyle: single
linter:
  enabled: true
  rules:
    complexity:
      # Tweak for TS4111
      useLiteralKeys: 'off'
    suspicious:
      # Tweak for Tailwind CSS v4+ (It'll fix in a Biome v2.3)
      noUnknownAtRules: 'off'
root: false
vcs:
  clientKind: git
  enabled: true
  useIgnoreFile: true
